<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>График постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #faf8f5;
      --card: #ffffff;
      --border: #f0e8e3;
      --accent: #e879a9;
      --accent-light: #fef0f5;
      --text: #3d3d3d;
      --text-muted: #9a9a9a;
      --success: #6dd5a0;
      --success-light: #e8faf0;
      --purple: #a78bfa;
      --orange: #fb923c;
      --pink: #f472b6;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .week {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .week-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .week-title .emoji {
      font-size: 16px;
    }

    .days {
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }

    .day-slot {
      flex: 1;
      background: var(--bg);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .day-slot.disabled {
      opacity: 0.4;
    }

    .day-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .day-name.mon { color: var(--purple); }
    .day-name.wed { color: var(--accent); }
    .day-name.fri { color: var(--orange); }

    .day-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 150ms ease;
    }

    .check-item:hover {
      color: var(--text);
    }

    .check-item.checked {
      color: var(--success);
    }

    .checkbox {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms ease;
      flex-shrink: 0;
    }

    .check-item:hover .checkbox {
      border-color: var(--accent);
    }

    .check-item.checked .checkbox {
      background: var(--success);
      border-color: var(--success);
    }

    .checkbox svg {
      width: 12px;
      height: 12px;
      color: white;
      opacity: 0;
      transition: opacity 150ms ease;
    }

    .check-item.checked .checkbox svg {
      opacity: 1;
    }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--accent));
      border-radius: 3px;
      transition: width 300ms ease;
    }

    .progress-text {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: right;
    }

    /* Month navigation */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .month-title {
      font-size: 18px;
      font-weight: 600;
    }

    .nav-btns {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      padding: 8px 16px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all 150ms ease;
      font-family: inherit;
    }

    .nav-btn:hover {
      border-color: var(--accent);
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-icon {
      font-size: 18px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📅 График постов</h1>
      <p class="subtitle">Пн, Ср, Пт в 09:00</p>
    </header>

    <div class="month-nav">
      <div class="month-title" id="month-title">Июль 2025</div>
      <div class="nav-btns">
        <button class="nav-btn" onclick="prevMonth()">← Назад</button>
        <button class="nav-btn" onclick="nextMonth()">Вперёд →</button>
      </div>
    </div>

    <div id="weeks-container"></div>

    <div class="stats">
      <div class="stat">
        <span class="stat-icon">✍️</span>
        <div>
          <div class="stat-value" id="stat-written">0</div>
          <div class="stat-label">написано</div>
        </div>
      </div>
      <div class="stat">
        <span class="stat-icon">✅</span>
        <div>
          <div class="stat-value" id="stat-published">0</div>
          <div class="stat-label">опубликовано</div>
        </div>
      </div>
      <div class="stat">
        <span class="stat-icon">📝</span>
        <div>
          <div class="stat-value" id="stat-pending">0</div>
          <div class="stat-label">осталось</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'post_schedule_v2';

    let currentDate = new Date();
    let schedule = {};

    // Day configuration
    const publishDays = [1, 3, 5]; // Mon, Wed, Fri
    const dayNames = {
      1: { short: 'Пн', full: 'Понедельник' },
      2: { short: 'Вт', full: 'Вторник' },
      3: { short: 'Ср', full: 'Среда' },
      4: { short: 'Чт', full: 'Четверг' },
      5: { short: 'Пт', full: 'Пятница' },
      6: { short: 'Сб', full: 'Суббота' },
      0: { short: 'Вс', full: 'Воскресенье' }
    };
    const dayClasses = { 1: 'mon', 3: 'wed', 5: 'fri' };

    // Load/Save
    function load() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) schedule = JSON.parse(stored);
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(schedule));
    }

    // Get week number
    function getWeekNumber(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + 4 - (d.getDay() || 7));
      const yearStart = new Date(d.getFullYear(), 0, 1);
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    // Get key for storage
    function getKey(dateStr) {
      return dateStr; // yyyy-mm-dd
    }

    // Navigation
    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      render();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      render();
    }

    // Check/uncheck
    function toggleCheck(dateStr, type) {
      const key = getKey(dateStr);
      if (!schedule[key]) {
        schedule[key] = { written: false, published: false };
      }
      schedule[key][type] = !schedule[key][type];
      save();
      render();
    }

    // Render
    function render() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      // Update month title
      document.getElementById('month-title').textContent = currentDate.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });

      const container = document.getElementById('weeks-container');
      container.innerHTML = '';

      // Get first day of month
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);

      // Find all weeks that have publishing days in this month
      const weeks = new Map();

      // Iterate through all days
      for (let d = 1; d <= lastDay.getDate(); d++) {
        const date = new Date(year, month, d);
        const dayOfWeek = date.getDay();
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

        if (publishDays.includes(dayOfWeek)) {
          const weekNum = getWeekNumber(date);
          if (!weeks.has(weekNum)) {
            weeks.set(weekNum, { days: [] });
          }
          weeks.get(weekNum).days.push({
            date: dateStr,
            dayOfWeek: dayOfWeek,
            dayNum: d,
            month: month
          });
        }
      }

      // Sort weeks
      const sortedWeeks = Array.from(weeks.entries()).sort((a, b) => a[0] - b[0]);

      // Current date for comparison
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      // Render weeks
      let weekIndex = 0;
      const totalWeeks = sortedWeeks.length;

      sortedWeeks.forEach(([weekNum, weekData]) => {
        weekIndex++;
        const isCurrentWeek = weekData.days.some(d => {
          const date = new Date(d.date);
          return date.toDateString() === today.toDateString();
        });

        const weekTitle = weekIndex === 1 ? 'Эта неделя' : 
                          weekIndex === 2 ? 'Следующая неделя' : 
                          `Неделя ${weekIndex}`;

        // Sort days
        weekData.days.sort((a, b) => a.dayOfWeek - b.dayOfWeek);

        // Calculate progress
        let written = 0, published = 0, total = weekData.days.length;
        weekData.days.forEach(d => {
          const key = getKey(d.date);
          if (schedule[key]?.written) written++;
          if (schedule[key]?.published) published++;
        });
        const progress = total > 0 ? (written / total) * 100 : 0;

        const html = `
          <div class="week">
            <div class="week-title">
              <span class="emoji">${isCurrentWeek ? '📍' : '📅'}</span>
              ${weekTitle}
            </div>
            <div class="days">
              ${weekData.days.map(d => {
                const date = new Date(d.date);
                const key = getKey(d.date);
                const data = schedule[key] || {};
                const isPast = date < today;
                
                return `
                  <div class="day-slot ${isPast ? 'past' : ''}">
                    <div class="day-name ${dayClasses[d.dayOfWeek]}">${dayNames[d.dayOfWeek].short}</div>
                    <div class="day-date">${d.dayNum} ${date.toLocaleDateString('ru-RU', { month: 'short' })}</div>
                    
                    <div class="check-item ${data.written ? 'checked' : ''}" onclick="toggleCheck('${d.date}', 'written')">
                      <div class="checkbox">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                          <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                      </div>
                      <span>написала</span>
                    </div>
                    
                    <div class="check-item ${data.published ? 'checked' : ''}" onclick="toggleCheck('${d.date}', 'published')">
                      <div class="checkbox">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                          <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                      </div>
                      <span>опубликовала</span>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
            <div class="progress-text">${written}/${total} написано</div>
          </div>
        `;

        container.innerHTML += html;
      });

      // Update stats
      updateStats();
    }

    function updateStats() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const lastDay = new Date(year, month + 1, 0);
      
      let written = 0, published = 0, total = 0;

      for (let d = 1; d <= lastDay.getDate(); d++) {
        const date = new Date(year, month, d);
        const dayOfWeek = date.getDay();
        
        if (publishDays.includes(dayOfWeek)) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const key = getKey(dateStr);
          total++;
          
          if (schedule[key]?.written) written++;
          if (schedule[key]?.published) published++;
        }
      }

      document.getElementById('stat-written').textContent = written;
      document.getElementById('stat-published').textContent = published;
      document.getElementById('stat-pending').textContent = total - written;
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prevMonth();
      if (e.key === 'ArrowRight') nextMonth();
    });

    // Init
    load();
    render();
  </script>
